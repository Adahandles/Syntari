# Syntari Docker Compose - Complete Development & Production Setup
version: '3.8'

services:
  # Syntari Interpreter (CLI/REPL)
  syntari:
    build:
      context: .
      dockerfile: Dockerfile
    image: syntari:0.4.0
    container_name: syntari-repl
    volumes:
      - ./examples:/scripts:ro
      - ./output:/output
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: --repl
    networks:
      - syntari-net

  # Web REPL Server
  web-repl:
    build:
      context: .
      dockerfile: Dockerfile
    image: syntari:0.4.0
    container_name: syntari-web-repl
    ports:
      - "8765:8765"
    volumes:
      - ./web:/app/web:ro
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - SYNTARI_WEB_HOST=0.0.0.0
      - SYNTARI_WEB_PORT=8765
      - SYNTARI_LOG_LEVEL=INFO
    command: python3 web/repl_server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8765)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - syntari-net

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: syntari-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/static:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-repl
    restart: unless-stopped
    networks:
      - syntari-net

  # Development container with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: syntari:0.4.0-dev
    container_name: syntari-dev
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - SYNTARI_ENV=development
    command: python3 main.py --repl
    stdin_open: true
    tty: true
    networks:
      - syntari-net

networks:
  syntari-net:
    driver: bridge

volumes:
  logs:
  output:
