[bumpversion]
current_version = 0.4.0
commit = True
tag = True
tag_name = v{new_version}
message = Bump version: {current_version} → {new_version}

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:src/interpreter/main.py]
search = VERSION = "{current_version}"
replace = VERSION = "{new_version}"

[bumpversion:file:Dockerfile]
search = org.opencontainers.image.version="{current_version}"
replace = org.opencontainers.image.version="{new_version}"

[bumpversion:file:docker-compose.yml]
search = syntari:{current_version}
replace = syntari:{new_version}

[bumpversion:file:CHANGELOG.md]
search = ## [Unreleased]
replace = ## [Unreleased]

## [{new_version}] - {now:%Y-%m-%d}
