name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security audit weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]"
          pip install bandit safety pip-audit

      - name: Run Bandit security scanner
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json
          bandit -r src/ -ll
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: |
          safety check --json --output safety-report.json || true
          safety check
        continue-on-error: true

      - name: Run pip-audit
        run: |
          pip-audit --desc
        continue-on-error: true

      - name: Run security tests
        run: |
          pytest tests/test_security.py -v
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4.5.0
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

      - name: Comment PR with security findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔒 Security Scan Results\n\n';
            
            try {
              const bandit = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
              const highSeverity = bandit.results.filter(r => r.issue_severity === 'HIGH');
              const mediumSeverity = bandit.results.filter(r => r.issue_severity === 'MEDIUM');
              
              comment += `### Bandit Analysis\n`;
              comment += `- High severity issues: ${highSeverity.length}\n`;
              comment += `- Medium severity issues: ${mediumSeverity.length}\n\n`;
              
              if (highSeverity.length > 0) {
                comment += '⚠️ High severity issues found! Please review.\n\n';
              }
            } catch (e) {
              comment += 'Could not parse Bandit report.\n\n';
            }
            
            comment += '📊 Full security reports available in workflow artifacts.\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
