name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[web]"

    - name: Run quick tests
      run: |
        pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=66 -x

    - name: Check code formatting
      run: |
        black --check src/ tests/

    - name: Quick lint
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check for common issues
      run: |
        # Check for print statements in src (except __main__ blocks)
        ! grep -r "print(" src/ --include="*.py" | grep -v "__main__" | grep -v "# print" || echo "⚠️  Found print() statements in src/"
        
        # Check for TODO/FIXME comments
        grep -r "TODO\|FIXME" src/ --include="*.py" || echo "✓ No TODO/FIXME comments"

    - name: PR Summary Comment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = `## PR Checks Summary
          
          ✅ Quick tests passed
          ✅ Code formatting checked
          ✅ Lint checks completed
          
          **Coverage**: Check the full CI run for detailed coverage report.
          **Python Version**: 3.12
          
          All checks must pass before merge.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
