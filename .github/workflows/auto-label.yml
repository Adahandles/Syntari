name: Auto Label PRs and Issues

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label-pr:
    name: Auto-label Pull Requests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        fetch-depth: 0

    - name: Label based on files changed
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          const labels = new Set();
          
          for (const file of files) {
            const path = file.filename;
            
            // Core language implementation
            if (path.startsWith('src/core/')) labels.add('core');
            if (path.startsWith('src/interpreter/')) labels.add('interpreter');
            if (path.startsWith('src/compiler/')) labels.add('compiler');
            if (path.startsWith('src/runtime/')) labels.add('runtime');
            if (path.startsWith('src/pkg/')) labels.add('package-manager');
            if (path.startsWith('src/tools/')) labels.add('tools');
            
            // Tests
            if (path.startsWith('tests/')) labels.add('tests');
            
            // Documentation
            if (path.endsWith('.md')) labels.add('documentation');
            
            // Workflows and CI
            if (path.startsWith('.github/workflows/')) labels.add('ci-cd');
            if (path === '.github/dependabot.yml') labels.add('dependencies');
            
            // Security
            if (path.includes('security') || path.includes('SECURITY')) labels.add('security');
            
            // Web REPL
            if (path.startsWith('web/')) labels.add('web-repl');
            
            // Configuration
            if (path === 'pyproject.toml' || path === 'setup.py' || path === 'requirements.txt') {
              labels.add('dependencies');
            }
            
            // Docker
            if (path.includes('Docker') || path.includes('docker-compose')) {
              labels.add('docker');
            }
          }
          
          // Size labels
          const additions = files.reduce((sum, file) => sum + file.additions, 0);
          const deletions = files.reduce((sum, file) => sum + file.deletions, 0);
          const total = additions + deletions;
          
          if (total < 10) labels.add('size/XS');
          else if (total < 50) labels.add('size/S');
          else if (total < 200) labels.add('size/M');
          else if (total < 500) labels.add('size/L');
          else labels.add('size/XL');
          
          // Apply labels
          if (labels.size > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: Array.from(labels)
            });
            
            console.log(`Applied labels: ${Array.from(labels).join(', ')}`);
          }

    - name: Label based on PR title
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const title = context.payload.pull_request.title.toLowerCase();
          const labels = [];
          
          // Conventional commit types
          if (title.startsWith('feat:') || title.includes('feature')) labels.push('enhancement');
          if (title.startsWith('fix:') || title.includes('bug')) labels.push('bug');
          if (title.startsWith('docs:')) labels.push('documentation');
          if (title.startsWith('refactor:')) labels.push('refactoring');
          if (title.startsWith('perf:') || title.includes('performance')) labels.push('performance');
          if (title.startsWith('test:')) labels.push('tests');
          if (title.startsWith('chore:')) labels.push('chore');
          if (title.startsWith('security:') || title.includes('security')) labels.push('security');
          if (title.includes('breaking') || title.includes('breaking change')) labels.push('breaking-change');
          
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }

  auto-label-issue:
    name: Auto-label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    
    steps:
    - name: Label based on issue title and body
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const title = context.payload.issue.title.toLowerCase();
          const body = (context.payload.issue.body || '').toLowerCase();
          const text = title + ' ' + body;
          const labels = [];
          
          // Issue types
          if (text.includes('bug') || text.includes('error') || text.includes('crash')) {
            labels.push('bug');
          }
          if (text.includes('feature request') || text.includes('enhancement')) {
            labels.push('enhancement');
          }
          if (text.includes('documentation') || text.includes('docs')) {
            labels.push('documentation');
          }
          if (text.includes('question') || text.includes('help')) {
            labels.push('question');
          }
          if (text.includes('security') || text.includes('vulnerability')) {
            labels.push('security');
          }
          if (text.includes('performance') || text.includes('slow')) {
            labels.push('performance');
          }
          
          // Priority indicators
          if (text.includes('urgent') || text.includes('critical') || text.includes('blocker')) {
            labels.push('priority: high');
          }
          
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
          }
