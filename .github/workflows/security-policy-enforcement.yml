name: Security Policy Enforcement

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  schedule:
    # Daily security checks at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  issues: write

jobs:
  # Check for sensitive files and data
  sensitive-data-check:
    name: Scan for Sensitive Data
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Check for secrets in code
      uses: trufflesecurity/trufflehog@3f55b94aae31c526afe7e9c8ee1c6a4d7cd0c3e7 # v3.82.13
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --only-verified --json --fail

    - name: Check for sensitive files
      run: |
        echo "Checking for sensitive files..."
        
        SENSITIVE_FILES=(
          ".env"
          "*.pem"
          "*.key"
          "*.cert"
          "*.p12"
          "*.pfx"
          "id_rsa"
          "id_dsa"
          "credentials.json"
        )
        
        FOUND_FILES=()
        for pattern in "${SENSITIVE_FILES[@]}"; do
          if find . -name "$pattern" -not -path "./.git/*" | grep -q .; then
            FOUND_FILES+=("$pattern")
          fi
        done
        
        if [ ${#FOUND_FILES[@]} -gt 0 ]; then
          echo "❌ ERROR: Found sensitive files that should not be committed:"
          printf '%s\n' "${FOUND_FILES[@]}"
          exit 1
        else
          echo "✅ No sensitive files found"
        fi

  # Verify dependencies are secure
  dependency-security:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Python
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.3.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[web]"
        pip install pip-audit safety

    - name: Run pip-audit
      run: |
        pip-audit --desc --format json --output pip-audit.json || true
        pip-audit --desc
      continue-on-error: false

    - name: Check for known vulnerabilities with Safety
      run: |
        safety check --json --output safety-report.json || true
        safety check
      continue-on-error: true

    - name: Verify no malicious packages
      run: |
        echo "Checking PyPI package sources..."
        # List all installed packages and their sources
        pip list --format=json > installed-packages.json
        
        # Check for typosquatting (common misspellings of popular packages)
        if pip list | grep -iE "(reqests|requets|urlib|urllib3s|numppy|pandsa|djanga)"; then
          echo "❌ Potential typosquatting detected!"
          exit 1
        fi
        
        echo "✅ No obvious malicious packages detected"

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-security-reports
        path: |
          pip-audit.json
          safety-report.json
          installed-packages.json

  # Enforce code quality and security standards
  code-security-standards:
    name: Code Security Standards
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Python
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.3.0
      with:
        python-version: '3.12'

    - name: Install security tools
      run: |
        pip install bandit semgrep

    - name: Run Bandit security linter
      run: |
        bandit -r src/ -ll -f json -o bandit-report.json || true
        bandit -r src/ -ll
      continue-on-error: true

    - name: Run Semgrep security rules
      run: |
        semgrep --config=auto --json --output=semgrep-report.json src/ || true
        semgrep --config=auto src/
      continue-on-error: true

    - name: Check file permissions
      run: |
        echo "Checking for overly permissive files..."
        
        # Find files with write permissions for group/others
        if find . -type f -perm /022 -not -path "./.git/*" | grep -q .; then
          echo "⚠️ Warning: Found files with write permissions for group/others"
          find . -type f -perm /022 -not -path "./.git/*"
        else
          echo "✅ File permissions are secure"
        fi

    - name: Verify Python path security
      run: |
        python3 << 'EOF'
        import sys
        import os
        
        print("Checking Python path security...")
        
        insecure_paths = [p for p in sys.path if p.startswith('/tmp') or p == '']
        
        if insecure_paths:
            print(f"⚠️ Warning: Insecure paths in PYTHONPATH: {insecure_paths}")
        else:
            print("✅ Python path is secure")
        EOF

    - name: Upload code security reports
      uses: actions/upload-artifact@65462800fd760344b1a7b458a1426d2aa275f82a # v4.4.0
      if: always()
      with:
        name: code-security-reports
        path: |
          bandit-report.json
          semgrep-report.json

  # Check for license compliance
  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Python
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.3.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -e ".[web]"
        pip install pip-licenses

    - name: Check dependency licenses
      run: |
        echo "Checking dependency licenses..."
        pip-licenses --format=json --output-file=licenses.json
        pip-licenses --format=markdown --output-file=licenses.md
        pip-licenses

    - name: Verify GPL compatibility
      run: |
        # Check for incompatible licenses (GPL/AGPL in proprietary code)
        if pip-licenses | grep -iE "(GPL|AGPL)" | grep -v LGPL; then
          echo "Error: Found GPL- or AGPL-licensed dependencies that may be incompatible with the"
          echo "proprietary license. Please remove or replace these dependencies, or obtain"
          echo "explicit legal approval before proceeding."
          exit 1
        fi

    - name: Upload license report
      uses: actions/upload-artifact@v4
      with:
        name: license-report
        path: |
          licenses.json
          licenses.md

  # Summary and PR comment
  security-summary:
    name: Security Check Summary
    needs: [sensitive-data-check, dependency-security, code-security-standards, license-compliance]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    
    steps:
    - name: Comment PR with security summary
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          const { data: checks } = await github.rest.checks.listForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.payload.pull_request.head.sha
          });
          
          let comment = '## 🔒 Security Policy Enforcement Summary\n\n';
          
          const jobs = [
            'sensitive-data-check',
            'dependency-security', 
            'code-security-standards',
            'license-compliance'
          ];
          
          let allPassed = true;
          
          for (const job of jobs) {
            const check = checks.check_runs.find(c => c.name.includes(job));
            if (check) {
              const status = check.conclusion === 'success' ? '✅' : 
                           check.conclusion === 'failure' ? '❌' : '⚠️';
              comment += `${status} **${job}**: ${check.conclusion}\n`;
              if (check.conclusion !== 'success') allPassed = false;
            }
          }
          
          comment += '\n';
          
          if (allPassed) {
            comment += '✅ **All security checks passed!**\n\n';
            comment += 'This PR meets all security policy requirements.\n';
          } else {
            comment += '⚠️ **Some security checks failed or have warnings**\n\n';
            comment += 'Please review the failed checks and address any issues.\n';
          }
          
          comment += '\n📊 Detailed reports available in workflow artifacts.\n';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
