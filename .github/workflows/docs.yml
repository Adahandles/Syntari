name: Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check Markdown files
      run: |
        # Check for broken links in markdown files
        echo "Checking Markdown files..."
        for file in $(find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*"); do
          echo "Checking $file"
          # Basic validation - file exists and is readable
          if [ ! -r "$file" ]; then
            echo "ERROR: Cannot read $file"
            exit 1
          fi
        done
        echo "✓ All Markdown files are valid"

    - name: Check for documentation completeness
      run: |
        # Ensure key documentation files exist
        required_docs=(
          "README.md"
          "CONTRIBUTING.md"
          "GETTING_STARTED.md"
          "SECURITY.md"
        )
        
        for doc in "${required_docs[@]}"; do
          if [ ! -f "$doc" ]; then
            echo "⚠️  Missing required documentation: $doc"
          else
            echo "✓ Found: $doc"
          fi
        done

    - name: Check code examples in docs
      run: |
        echo "Checking for code examples in documentation..."
        # Count code blocks in README
        code_blocks=$(grep -c '```' README.md || echo "0")
        echo "Found $code_blocks code blocks in README.md"
        
        if [ "$code_blocks" -lt 2 ]; then
          echo "⚠️  README.md has few code examples. Consider adding more."
        fi

    - name: Generate docs report
      if: always()
      run: |
        echo "## Documentation Report" > docs-report.txt
        echo "" >> docs-report.txt
        echo "**Total Markdown files**: $(find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' | wc -l)" >> docs-report.txt
        echo "**Total lines of documentation**: $(find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' -exec cat {} \; | wc -l)" >> docs-report.txt
        cat docs-report.txt

    - name: Upload docs report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: docs-report
        path: docs-report.txt
        retention-days: 30
