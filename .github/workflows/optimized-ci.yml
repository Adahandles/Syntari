name: Optimized CI with Caching

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  # Path filter to determine what changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Check changed files
      uses: dorny/paths-filter@v3.0.2
      id: filter
      with:
        filters: |
          python:
            - 'src/**/*.py'
            - 'tests/**/*.py'
            - '*.py'
            - 'pyproject.toml'
            - 'requirements.txt'
          docs:
            - '**.md'
            - 'docs/**'
          workflows:
            - '.github/workflows/**'
          docker:
            - 'Dockerfile'
            - 'docker-compose.yml'
  
  # Only run tests if Python code changed
  test-conditional:
    name: Conditional Tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Setup Python with cache
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          pyproject.toml
    
    - name: Cache pre-commit hooks
      uses: actions/cache@v5.0.3
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
    
    - name: Install dependencies (cached)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[web]"
    
    - name: Run tests with pytest-xdist (parallel)
      run: |
        pip install pytest-xdist
        pytest tests/ -n auto --tb=short
  
  # Only run lint if Python or workflow files changed
  lint-conditional:
    name: Conditional Lint
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Setup Python with cache
      uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.3.0
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Cache linting tools
      uses: actions/cache@v5.0.3
      with:
        path: |
          ~/.cache/pip
          ~/.cache/pre-commit
        key: lint-${{ hashFiles('requirements.txt', '.pre-commit-config.yaml') }}
    
    - name: Install linting tools
      run: |
        pip install black flake8 mypy
    
    - name: Run linters
      run: |
        black --check src/ tests/
        flake8 src/ tests/
        mypy src/ --ignore-missing-imports
  
  # Docs validation only if docs changed
  docs-conditional:
    name: Conditional Docs Check
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Check markdown links
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'
