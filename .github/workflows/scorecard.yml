name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Run weekly on Saturday at 4:00 AM UTC
    - cron: '0 4 * * 6'
  push:
    branches: [ main ]
  workflow_dispatch:

# Declare permissions at job level (not workflow level)
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard
      security-events: write
      # Needed to publish results and get a badge
      id-token: write
      # Needed for SARIF upload
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "write" PAT token. Uncomment if you want to enable this feature
          # repo_token: ${{ secrets.SCORECARD_READ_TOKEN }}

          # Publish results to OpenSSF REST API for easy access by consumers
          publish_results: true

      # Upload the results as artifacts (optional)
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Upload the results to GitHub's code scanning dashboard
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
